category: weather
version: "1.0"
rules:
  - id: heat_performance_impact
    principle: "Endurance performance decreases 1-3% per 5C rise above 15C due to increased cardiovascular strain and thermoregulatory demand"
    application: "Reduce target pace by 1-3% per 5C above 15C. Above 30C cap intensity at Zone 2. Above 35C move training indoors"
    conditions: "Ambient or feels-like temperature exceeds 15C during outdoor training"
    citation: "Ely MR et al. (2007) Impact of Weather on Marathon-Running Performance. Med Sci Sports Exerc. 39(3):487-493."
    confidence: high
    tags: [heat, pace, performance, temperature, endurance]
    sport_specific: null

  - id: cold_performance
    principle: "Cold exposure increases energy expenditure 2-5% through shivering thermogenesis and reduces muscle contractile efficiency"
    application: "Extend warm-up to 15+ minutes below 5C. Below 0C wind chill add thermal layers and protect extremities. Below -15C wind chill train indoors"
    conditions: "Ambient temperature below 5C or wind chill below 0C"
    citation: "Castellani JW & Young AJ (2016) Human Physiological Responses to Cold Exposure. Auton Neurosci. 196:68-74."
    confidence: high
    tags: [cold, temperature, warm_up, energy_expenditure, injury_prevention]
    sport_specific: null

  - id: humidity_hydration
    principle: "Humidity above 70% impairs evaporative cooling and increases core temperature rise rate during exercise"
    application: "Increase fluid intake 20-30% when humidity exceeds 70%. Monitor for early signs of heat illness. Reduce intensity if humidity exceeds 80% combined with temperature above 25C"
    conditions: "Relative humidity above 70% during aerobic exercise"
    citation: "Maughan RJ et al. (2007) Fluid and Electrolyte Balance in Elite Male Football Players Training in a Cool Environment. J Sports Sci. 25(1):73-79."
    confidence: high
    tags: [humidity, hydration, heat_illness, evaporative_cooling, fluid]
    sport_specific: null

  - id: wind_resistance_cycling
    principle: "Aerodynamic drag increases with the square of wind speed requiring disproportionately more power to maintain speed"
    application: "Headwind above 30 km/h increases power demand 20-40% at race pace. Adjust target power not speed. Use drafting when possible. Above 50 km/h cycling is unsafe"
    conditions: "Wind speed exceeds 20 km/h during cycling sessions"
    citation: "Martin JC et al. (1998) Validation of a Mathematical Model for Road Cycling Power. J Appl Biomech. 14(3):276-291."
    confidence: high
    tags: [wind, cycling, aerodynamics, power, drag]
    sport_specific: cycling

  - id: rain_safety
    principle: "Wet conditions reduce surface traction by 20-40% and increase hypothermia risk through accelerated heat loss from wet clothing"
    application: "Reduce pace on turns and descents in rain. Avoid painted road markings. Use waterproof outer layer. In heavy rain above 5mm/hr consider postponing. During thunderstorms stop immediately"
    conditions: "Active precipitation during outdoor training"
    citation: "Bergeron MF et al. (2012) International Olympic Committee Consensus Statement on Thermoregulatory and Altitude Challenges for High-Level Athletes. Br J Sports Med. 46(11):770-779."
    confidence: high
    tags: [rain, safety, traction, hypothermia, visibility]
    sport_specific: null

  - id: uv_exposure
    principle: "UV index above 6 causes sunburn within 30 minutes of unprotected exposure and compounds heat stress during exercise"
    application: "Apply SPF 30+ sunscreen before outdoor sessions when UV exceeds 5. Wear UV-protective hat and sunglasses when UV exceeds 8. Schedule sessions before 10am or after 4pm when possible"
    conditions: "UV index above 5 during outdoor training"
    citation: "Moehrle M (2008) Outdoor Sports and Skin Cancer. Clin Dermatol. 26(1):12-15."
    confidence: high
    tags: [uv, sun_protection, skin, heat_stress, timing]
    sport_specific: null

  - id: heat_acclimation
    principle: "Heat acclimation over 10-14 days of progressive heat exposure reduces core temperature, heart rate, and perceived exertion by 10-15%"
    application: "Begin heat acclimation 2 weeks before competition in hot environments. Start with 30-minute sessions at low intensity and progress to 60-90 minutes. Expect performance decrements in the first 3-5 days"
    conditions: "Athlete preparing for competition in ambient temperature above 28C without prior heat exposure"
    citation: "Periard JD et al. (2015) Cardiovascular Adaptations Supporting Human Exercise-Heat Acclimation. Auton Neurosci. 196:52-62."
    confidence: high
    tags: [heat, acclimation, adaptation, competition, protocol]
    sport_specific: null

  - id: hydration_guidelines
    principle: "Sweat rates of 0.5-2.0 L/hr are common during exercise in heat and fluid replacement should match 80% of sweat losses"
    application: "Estimate individual sweat rate by pre/post-exercise weighing. Aim to replace 80% of fluid losses. Include sodium 500-700mg/L for sessions exceeding 60 minutes in heat"
    conditions: "Exercise sessions longer than 45 minutes especially in temperatures above 20C"
    citation: "Sawka MN et al. (2007) American College of Sports Medicine Position Stand: Exercise and Fluid Replacement. Med Sci Sports Exerc. 39(2):377-390."
    confidence: high
    tags: [hydration, sweat_rate, electrolytes, sodium, fluid_replacement]
    sport_specific: null

  - id: dew_point_comfort
    principle: "Dew point above 20C indicates oppressive humidity conditions where evaporative cooling is severely limited regardless of relative humidity"
    application: "When dew point exceeds 20C treat conditions as high-risk for heat illness. Reduce intensity by 10-15% and increase rest intervals. Above 24C dew point consider indoor alternatives"
    conditions: "Calculated dew point exceeds 20C during planned outdoor training"
    citation: "Budd GM (2008) Wet-Bulb Globe Temperature (WBGT): Its History and Its Limitations. J Sci Med Sport. 11(1):20-32."
    confidence: medium
    tags: [dew_point, humidity, heat_illness, comfort, thermoregulation]
    sport_specific: null

  - id: thunderstorm_safety
    principle: "Lightning strikes kill or injure hundreds of athletes annually and outdoor activities should cease when thunder is heard or lightning seen"
    application: "Apply the 30-30 rule: seek shelter when flash-to-bang time is under 30 seconds and wait 30 minutes after last thunder. Avoid open fields, tall trees, and water during storms"
    conditions: "Thunderstorm warning issued or weather code indicates active thunderstorm"
    citation: "Walsh KM et al. (2013) National Athletic Trainers Association Position Statement: Lightning Safety for Athletics and Recreation. J Athl Train. 48(2):258-270."
    confidence: high
    tags: [thunderstorm, lightning, safety, shelter, emergency]
    sport_specific: null

  - id: cold_muscle_injury
    principle: "Cold muscles have reduced elasticity and slower neural conduction increasing strain injury risk by 20-30%"
    application: "Extend dynamic warm-up by 5-10 minutes in temperatures below 10C. Avoid explosive efforts until core muscle temperature is elevated. Consider indoor warm-up before outdoor sessions"
    conditions: "Ambient temperature below 10C particularly for interval or high-intensity sessions"
    citation: "Racinais S & Oksa J (2010) Temperature and Neuromuscular Function. Scand J Med Sci Sports. 20(Suppl 3):1-18."
    confidence: high
    tags: [cold, muscle, injury, warm_up, elasticity, neuromuscular]
    sport_specific: null

  - id: air_quality
    principle: "Exercise in AQI above 100 increases particulate inhalation 10-20x compared to rest due to higher ventilation rates and mouth breathing"
    application: "Check AQI before outdoor sessions. AQI 51-100 reduce intensity for sensitive individuals. AQI 101-150 move indoors or reduce to low intensity. AQI above 150 train indoors only"
    conditions: "Local air quality index exceeds 50 especially in urban training environments"
    citation: "Rundell KW et al. (2008) Inhalation of Ultrafine and Fine Particulate Matter Disrupts Systemic Vascular Function. Inhal Toxicol. 19(2):133-140."
    confidence: medium
    tags: [air_quality, aqi, pollution, respiratory, ventilation]
    sport_specific: null

  - id: altitude_weather
    principle: "Altitude amplifies weather effects through lower oxygen partial pressure increased UV exposure and faster dehydration from dry air"
    application: "Above 1500m increase hydration 25% and apply sunscreen more frequently. Expect additional 3-5% pace reduction per 1000m of altitude on top of temperature adjustments. Monitor for altitude sickness symptoms"
    conditions: "Training location above 1500m elevation combined with adverse weather"
    citation: "Chapman RF et al. (2014) Defining the Dose of Altitude Training: How High to Live for Optimal Sea Level Performance Enhancement. J Appl Physiol. 116(6):595-603."
    confidence: medium
    tags: [altitude, uv, dehydration, hypoxia, combined_stress]
    sport_specific: null

  - id: pre_cooling
    principle: "Pre-cooling strategies such as ice vests or cold water ingestion can lower core temperature 0.3-0.5C and improve endurance performance 3-6% in heat"
    application: "Use ice slurry ingestion 30 minutes before hot-weather sessions. Consider ice vest during warm-up when temperature exceeds 30C. Cold towels on neck and forearms during rest intervals"
    conditions: "Planned high-intensity or competition session in ambient temperature above 28C"
    citation: "Ross MLR et al. (2013) Pre-cooling Methods and Their Effects on Athletic Performance. Sports Med. 43(3):207-225."
    confidence: medium
    tags: [pre_cooling, ice, heat, performance, strategy]
    sport_specific: null

  - id: optimal_temperature
    principle: "Peak endurance performance occurs between 10-15C where thermoregulatory strain is minimal and oxygen delivery is optimized"
    application: "When possible schedule key sessions and races in the 10-15C temperature window. Use this range as baseline for all pace adjustment calculations. No pace or intensity modifications needed in this range"
    conditions: "Planning session timing or interpreting performance data across temperature conditions"
    citation: "Ely MR et al. (2007) Impact of Weather on Marathon-Running Performance. Med Sci Sports Exerc. 39(3):487-493."
    confidence: high
    tags: [temperature, optimal, performance, pace, baseline]
    sport_specific: null
